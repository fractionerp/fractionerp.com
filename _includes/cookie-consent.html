<div id="cookie-consent" role="dialog" aria-label="Cookie consent" aria-describedby="cookie-consent-msg" style="display:none;">
  <div class="cookie-consent-inner">
    <p id="cookie-consent-msg">We use cookies to analyse site traffic and improve your experience. Essential cookies are always active. Analytics cookies (Google Analytics) are only used with your permission. <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a></p>
    <div class="cookie-consent-actions">
      <button id="cookie-accept" type="button" class="cookie-consent-btn cookie-consent-accept">Accept All</button>
      <button id="cookie-reject" type="button" class="cookie-consent-btn cookie-consent-reject">Necessary Only</button>
    </div>
  </div>
</div>
