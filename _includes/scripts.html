<a href="#" class="back-to-top d-flex align-items-center justify-content-center" aria-label="Back to top"><i class="bi bi-arrow-up-short" aria-hidden="true"></i></a>

<script>
  if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }
  if (!window.location.hash) { window.scrollTo(0, 0); }
</script>

<!-- Vendor JS Files (CDN) - deferred for performance -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/js/glightbox.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/isotope-layout@3.0.6/dist/isotope.pkgd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/waypoints@4.0.1/lib/noframework.waypoints.min.js" defer></script>

<!-- Template Main JS File -->
<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

<!-- Fontawesome (deferred) -->
<script src="https://kit.fontawesome.com/ce2cdb0f36.js" crossorigin="anonymous" defer></script>

<!-- Google Analytics with Consent Mode v2 — fires immediately in denied state, upgraded on consent -->
{% if site.google_analytics %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.gaTrackingId = '{{ site.google_analytics }}';
  window.dataLayer = window.dataLayer || [];
  window.gtag = function gtag(){ window.dataLayer.push(arguments); };
  window.gtag('consent', 'default', {
    'ad_storage': 'denied',
    'ad_user_data': 'denied',
    'ad_personalization': 'denied',
    'analytics_storage': 'denied',
    'wait_for_update': 500
  });
  window.gtag('js', new Date());
  window.gtag('config', window.gaTrackingId, { anonymize_ip: true });
</script>
{% endif %}

<!-- Cookie Consent -->
<script src="{{ '/assets/js/cookie-consent.js' | relative_url }}" defer></script>
