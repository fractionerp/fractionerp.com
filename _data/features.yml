common_features:
  - Export data to Excel
  - Direct email of documents to customers and suppliers
  - Activity logs
  - Attach files and documents to records
  - Manage user permissions and roles
  - Automatic software updates with new features
  - Automatic daily backup
  - Access anywhere with any web-browser
  - Multi-currency
  - Unlimited online support
  - Integration with Xero, Quickbooks, Sage, Intouch and Siemens Opcenter
  - Import your data into parts, customer and suppliers
