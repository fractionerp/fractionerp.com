# Features organized by category
sales_order_processing:
  - title: CRM
    url: /crm/
    icon: fa-solid fa-users
    description: Track customer relationships, sales actions and follow-ups alongside your ERP data.
  - title: Contracts
    url: /contracts/
    icon: fa-regular fa-file
    description: Manage enquiries, quotes and sales orders from the same customer record.
  - title: Parts and Inventory
    url: /parts-and-inventory/
    icon: fa-solid fa-gears
    description: Define all parts, traceability, stock levels and inspection requirements.

production:
  - title: Bill of Materials
    url: /bill-of-materials/
    icon: fa fa-1x fa-list
    description: Define part structure, operations and instructions for production and estimate production costs.
  - title: Works Orders
    url: /works-orders/
    icon: fa fa-1x fa-file-lines
    description: Create, release and track production orders from demand through completion.
  - title: Production Scheduling
    url: /production-scheduling/
    icon: fa fa-1x fa-calendar-alt
    description: Automatic or manual scheduling with drag and drop scheduling tools.
  - title: Shop Floor Data Capture
    url: /shop-floor-data-capture/
    icon: fa fa-regular fa-clock
    description: Real time data collection from production to track all processes and orders.
  - title: MRP & Purchasing
    url: /purchasing/
    icon: fa fa-1x fa-cart-shopping
    description: Use MRP demand to create purchase requirements, approvals and supplier orders.

quality_management:
  - title: Standard Operating Procedures
    url: /sop-software/
    icon: fa fa-1x fa-list-ol
    description: Digital SOPs with step-by-step content, revision control, training assignments and ISO 9001-ready audit trail.
  - title: Non-Conformance Reports
    url: /non-conformance-reports/
    icon: fa fa-1x fa-triangle-exclamation
    description: Track and manage non-conformances with root cause analysis, corrective actions and 5 Why methodology.
  - title: Calibration Log
    url: /calibration-log/
    icon: fa fa-1x fa-ruler-combined
    description: Manage equipment calibration schedules, certificates and maintain compliance records.
  - title: Inspection Data
    url: /inspection-data/
    icon: fa fa-1x fa-clipboard-check
    description: Create BOM inspection routines for text, sizes, photos, dropdowns and tolerance-based production checks.
  - title: Customer Returns
    url: /customer-returns/
    icon: fa fa-1x fa-rotate-left
    description: Authorise returned products, link them to customer orders and track reason, rectification and replacement shipment.
  - title: Traceability
    url: /traceability/
    icon: fa fa-1x fa-barcode
    description: Serial and batch traceability for all manufactured and bought in parts.

health_safety:
  - title: Health and Safety
    url: /health-safety-software/
    icon: fa fa-1x fa-shield-halved
    description: Manage practical health and safety records inside your manufacturing ERP.
  - title: Risk Assessments
    url: /risk-assessment-software/
    icon: fa fa-1x fa-triangle-exclamation
    description: Create and maintain workplace risk assessments with hazards, controls and review information.
  - title: Visitor Registration
    url: /visitor-kiosk/
    icon: fa fa-1x fa-id-badge
    description: Let visitors sign in, complete declarations, print badges and notify their host without an ERP user account.
  - title: COSHH Register
    url: /health-safety-software/#coshh-register
    icon: fa fa-1x fa-flask
    description: Coming soon - organise COSHH substance records alongside operational ERP data.

business:
  - title: Shipping
    url: /shipping/
    icon: fa fa-1x fa-truck
    description: Create shipments, send customer notifications and raise invoices from despatch data.
  - title: Invoicing
    url: /invoicing/
    icon: fa fa-solid fa-money-check-dollar
    description: Raise invoices from shipment data and push them to your accounting software.
  - title: Task Management
    url: /erp-task-management/
    icon: fa fa-1x fa-square-check
    description: Assign production, quality and admin actions with owners and due dates.
  - title: User Management
    url: /user-management/
    icon: fa fa-1x fa-gauge
    description: Set user roles, module permissions and approval access by team.
  - title: ERP Integrations
    url: /integrations/
    icon: fa fa-1x fa-gauge
    description: Connect Fraction ERP with accounting, reporting and manufacturing systems.

people:
  - title: Training Log
    url: /training-log/
    icon: fa fa-1x fa-clipboard-user
    description: Log operator training, approval and completion records in one controlled place.
  - title: Time & Attendance
    url: /time-and-attendance/
    icon: fa fa-1x fa-business-time
    description: Connect clocking, leave, sickness and staff availability directly to production scheduling.
  - title: Operator Performance
    icon: fa fa-1x fa-chart-line
    coming_soon: true
    description: Coming soon - review operator activity and performance trends from live production data.

company_performance:
  - title: Dashboard
    url: /erp-dashboard/
    icon: fa fa-1x fa-gauge
    description: See business exceptions including late deliveries and shipments. Monitor processes in real time.
  - title: Key Performance Indicators
    url: /erp-key-performance-indicators/
    icon: fa fa-1x fa-gauge
    description: Monitor trends and performance of sales, orders and on time deliveries.
  - title: Reports
    url: /reports/
    icon: fa fa-1x fa-file-excel
    description: Review ERP data in reports and export it to Excel when needed.

