    text: Keep customer details and activity together.
  - image: "/assets/img/CRM-log-event.webp"
    title: Log activity
    text: Record calls, emails and follow-up notes.
  - image: "/assets/img/CRM-track-tasks.webp"
    title: Track tasks
    text: Keep sales actions visible to the team.
  related:
  - title: Sales Orders
    url: "/contracts/"
  - title: Dashboard
    url: "/erp-dashboard/"
  - title: Task Management
    url: "/erp-task-management/"
  cta_title: Manage Sales Activity Inside Your ERP
  cta_text: Track customer relationships and sales opportunities alongside your live
    production data.
