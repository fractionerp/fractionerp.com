    text: Store company details, contacts, notes and activity history so everyone
      works from the same customer record.
  - title: Follow up sales opportunities
    text: Track opportunities and actions before they become quotes or contracts,
      reducing missed follow-ups.
  - title: Connect CRM to operations
    text: Move from customer conversation to enquiry, quote and order without re-keying
      information.
  - title: Manufacturing context
    text: Give sales teams visibility of the operational information they need before
      promising dates or chasing work.
  screenshots:
