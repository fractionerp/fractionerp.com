plans:
  - name: Core
    tagline: Run your business with a complete ERP system
    description: Everything you need to manage inventory, orders, and production in one place.
    price: 37
    currency: "£"
    period: per user/month
    features:
      - Sales Order Management
      - Bill of Materials
      - Parts
      - Works Orders
      - MRP Demand
      - Purchasing
      - Multi-stock Locations
      - Non Conformance Reports
      - Unlimited Shop Floor Data Capture
      - Shipping
      - Invoicing
      - Accounts Integrations
      - Dashboard
      - Reports
      - Automatic Production Scheduling
      - Drag and Drop Production Scheduling

  - name: Advanced
    tagline: Take control of planning, operations and quality
    description: Add production planning, scheduling, and real-time operational visibility.
    price: 52
    currency: "£"
    period: per user/month
    popular: true
    inherits_label: "all features of core plan, plus:"
    features:
      - MRP Demand + Projection
      - Proforma Invoicing
      - Group Workcentres
      - Master Production Schedule
      - Cert. of Conformance
      - Key Performance Indicators (KPIs)
      - Multi-currency
      - Commercial Invoices
      - BOM Tooling and Jigs
      - Task Management
      - Subcontract Management
      - NCR Analytics
      - Production KPIs
      - Calibration Log
      - Serial Traceability

  - name: Pro
    tagline: Drive performance and efficiency at scale with advanced tools
    description: Advanced tools to optimise performance, improve accuracy, and scale operations.
    price: 75
    currency: "£"
    period: per user/month
    inherits_label: "all features of advanced plan, plus:"
    features:
      - Batch Traceability
      - SOPs
      - Customer Returns
      - RFQ's for purchasing
      - Inspection Reports
      - Contract Review|*
      - API Integration
      - CRM
      - Training Log
      - Leave Management|*
      - Risk Assessments
      - COSHH Register|*

  - name: Moulding Edition
    tagline: Built for plastic injection moulding manufacturers
    description: A specialised solution designed specifically for the needs of injection moulding operations.
    price: custom
    inherits_label: "all features of pro plan, plus:"
    features:
      - Mould & tool management
      - BOMs defined by material content
      - Demand calculated with scrap rates
      - Industry-specific packaging & labelling
      - Cavity and cycle tracking
      - Production run visibility
      - InTouch monitoring integration
    positioning: Additional tooling, process, and production features tailored to injection moulding.
    industry: true

subscription_includes:
  - Unlimited, free SFDC users
  - Unlimited online and telephone support
  - Automatic software updates with new features
  - Automatic daily backup
  - Access anywhere with any web-browser
  - Unlimited file storage and records
